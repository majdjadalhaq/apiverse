<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIVerse Demo Sandbox</title>
    <!--
      This page is loaded inside a `<iframe sandbox="allow-scripts allow-same-origin">`
      from the host app. It registers a small catalog of demo functions and
      renders whichever one the host asks for via postMessage.

      Contract (mirrors lib/demo-sandbox/messages.ts):
        host → { type: 'RENDER_DEMO', demoKey, params }
        sandbox → { type: 'DEMO_READY' | 'DEMO_RESULT' | 'DEMO_ERROR', … }
    -->
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: transparent;
        color: #0f172a;
      }
      body {
        padding: 16px;
        line-height: 1.5;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e2e8f0;
        }
      }
      .card {
        background: rgba(248, 250, 252, 0.7);
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
      }
      @media (prefers-color-scheme: dark) {
        .card {
          background: rgba(15, 23, 42, 0.6);
          border-color: #1f2937;
        }
      }
      .error {
        color: #ef4444;
        background: #fef2f2;
        border: 1px solid #fecaca;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
      }
      @media (prefers-color-scheme: dark) {
        .error {
          color: #fca5a5;
          background: rgba(127, 29, 29, 0.3);
          border-color: rgba(127, 29, 29, 0.6);
        }
      }
      .loading {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #64748b;
        font-size: 14px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6366f1;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        display: block;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: #475569;
      }
      .accent {
        color: #6366f1;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .flag {
        font-size: 3rem;
        line-height: 1;
      }
      .muted {
        color: #64748b;
        font-size: 13px;
      }
      h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading"><span class="dot"></span>Initializing sandbox…</div>
    </div>

    <script>
      const demos = {}
      const root = document.getElementById('root')

      function setHTML(html) {
        root.innerHTML = html
      }
      function renderError(message) {
        setHTML('<div class="error">' + escapeHtml(message) + '</div>')
      }
      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        })[c])
      }
      function post(message) {
        parent.postMessage(message, '*')
      }

      window.registerDemo = function (key, fn) {
        demos[key] = fn
      }

      window.addEventListener('message', async (event) => {
        const msg = event.data
        if (!msg || msg.type !== 'RENDER_DEMO') return

        const demo = demos[msg.demoKey]
        if (!demo) {
          renderError('Demo "' + msg.demoKey + '" is not registered.')
          post({ type: 'DEMO_ERROR', message: 'Demo not found: ' + msg.demoKey })
          return
        }

        setHTML('<div class="loading"><span class="dot"></span>Fetching…</div>')
        try {
          const html = await demo(msg.params || {})
          setHTML(html)
          post({ type: 'DEMO_RESULT', data: { demoKey: msg.demoKey } })
        } catch (err) {
          const message = (err && err.message) || 'Demo failed'
          renderError(message)
          post({ type: 'DEMO_ERROR', message })
        }
      })

      // Announce readiness so the host can send the initial RENDER_DEMO.
      post({ type: 'DEMO_READY' })
    </script>

    <!-- Built-in demo registrations. Each demo fn returns an HTML string. -->
    <script>
      window.registerDemo('cat-facts', async () => {
        const res = await fetch('https://catfact.ninja/fact')
        const data = await res.json()
        return (
          '<div class="card"><h3>Cat fact</h3><p>' +
          escapeHtml(data.fact) +
          '</p></div>'
        )
      })

      window.registerDemo('dog-ceo', async () => {
        const res = await fetch('https://dog.ceo/api/breeds/image/random')
        const data = await res.json()
        return (
          '<div class="card"><img src="' +
          escapeHtml(data.message) +
          '" alt="Random dog" loading="lazy" /></div>'
        )
      })

      window.registerDemo('jokeapi', async () => {
        const res = await fetch(
          'https://v2.jokeapi.dev/joke/Programming?type=single&safe-mode',
        )
        const data = await res.json()
        return (
          '<div class="card"><h3 class="muted">Programming joke</h3><p>' +
          escapeHtml(data.joke || '') +
          '</p></div>'
        )
      })

      window.registerDemo('open-trivia-db', async (params) => {
        const category = params.category || ''
        const url =
          'https://opentdb.com/api.php?amount=1' +
          (category ? '&category=' + encodeURIComponent(category) : '')
        const res = await fetch(url)
        const data = await res.json()
        const q = data.results && data.results[0]
        if (!q) throw new Error('No question returned')
        return (
          '<div class="card"><p class="muted">' +
          escapeHtml(q.category) +
          '</p><h3>' +
          q.question +
          '</h3><p>Answer: <span class="accent">' +
          q.correct_answer +
          '</span></p></div>'
        )
      })

      window.registerDemo('rest-countries', async (params) => {
        const name = params.name || 'germany'
        const res = await fetch(
          'https://restcountries.com/v3.1/name/' + encodeURIComponent(name),
        )
        if (!res.ok) throw new Error('Country not found: ' + name)
        const data = await res.json()
        const c = data[0]
        return (
          '<div class="card row"><div class="flag">' +
          escapeHtml(c.flag || '🏳️') +
          '</div><div><h3>' +
          escapeHtml(c.name?.common || name) +
          '</h3><p class="muted">' +
          escapeHtml(c.capital?.[0] || '—') +
          ' · pop ' +
          (c.population || 0).toLocaleString() +
          '</p></div></div>'
        )
      })

      window.registerDemo('pokeapi', async (params) => {
        const name = (params.name || 'pikachu').toLowerCase()
        const res = await fetch('https://pokeapi.co/api/v2/pokemon/' + encodeURIComponent(name))
        if (!res.ok) throw new Error('Pokémon not found: ' + name)
        const data = await res.json()
        return (
          '<div class="card row"><img src="' +
          escapeHtml(data.sprites?.front_default || '') +
          '" width="96" height="96" alt="' +
          escapeHtml(data.name) +
          '" /><div><h3 style="text-transform:capitalize">' +
          escapeHtml(data.name) +
          '</h3><p class="muted">Height ' +
          data.height / 10 +
          'm · Weight ' +
          data.weight / 10 +
          'kg</p></div></div>'
        )
      })

      window.registerDemo('nasa-apod', async () => {
        const res = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY')
        const data = await res.json()
        const media =
          data.media_type === 'image'
            ? '<img src="' + escapeHtml(data.url) + '" alt="' + escapeHtml(data.title) + '" />'
            : '<p class="muted">Today\'s APOD is a video — see nasa.gov.</p>'
        return (
          '<div class="card"><h3>' +
          escapeHtml(data.title || 'APOD') +
          '</h3>' +
          media +
          '<p class="muted" style="margin-top:8px">' +
          escapeHtml((data.explanation || '').slice(0, 200)) +
          '…</p></div>'
        )
      })

      window.registerDemo('open-meteo', async (params) => {
        const lat = params.lat || '52.52'
        const lon = params.lon || '13.41'
        const res = await fetch(
          'https://api.open-meteo.com/v1/forecast?latitude=' +
            encodeURIComponent(lat) +
            '&longitude=' +
            encodeURIComponent(lon) +
            '&current_weather=true',
        )
        const data = await res.json()
        const w = data.current_weather
        return (
          '<div class="card"><h3>' +
          escapeHtml(lat) +
          ', ' +
          escapeHtml(lon) +
          '</h3><p><span class="accent" style="font-size:28px">' +
          w.temperature +
          '°C</span></p><p class="muted">Wind ' +
          w.windspeed +
          ' km/h</p></div>'
        )
      })
    </script>
  </body>
</html>
